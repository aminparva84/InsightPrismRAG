<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="hg-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="hg-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06090f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="520" height="420" fill="url(#hg-bg)"/>
  <!-- edges -->
  <g stroke="url(#hg-grad)" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="260" y1="200" x2="120" y2="90"/><line x1="260" y1="200" x2="400" y2="85"/>
    <line x1="260" y1="200" x2="430" y2="210"/><line x1="260" y1="200" x2="380" y2="340"/>
    <line x1="260" y1="200" x2="140" y2="320"/><line x1="260" y1="200" x2="80" y2="200"/>
    <line x1="120" y1="90" x2="80" y2="200"/><line x1="400" y1="85" x2="430" y2="210"/>
    <line x1="140" y1="320" x2="380" y2="340"/><line x1="120" y1="90" x2="400" y2="85"/>
    <line x1="80" y1="200" x2="140" y2="320"/><line x1="430" y1="210" x2="380" y2="340"/>
  </g>
  <!-- community clusters -->
  <circle cx="120" cy="90" r="36" fill="rgba(99,102,241,0.08)" stroke="rgba(129,140,248,0.4)" stroke-width="1"/>
  <circle cx="400" cy="85" r="32" fill="rgba(139,92,246,0.08)" stroke="rgba(192,132,252,0.35)" stroke-width="1"/>
  <circle cx="140" cy="320" r="34" fill="rgba(45,212,191,0.08)" stroke="rgba(52,211,153,0.35)" stroke-width="1"/>
  <circle cx="380" cy="340" r="30" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
  <!-- nodes -->
  <g filter="url(#hg-glow)">
    <circle cx="260" cy="200" r="22" fill="#1e1b4b" stroke="url(#hg-grad)" stroke-width="2.5"/>
    <text x="260" y="205" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="system-ui,sans-serif" font-weight="600">YOU</text>
  </g>
  <circle cx="120" cy="90" r="10" fill="#6366f1"/><circle cx="95" cy="105" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="400" cy="85" r="10" fill="#8b5cf6"/><circle cx="420" cy="100" r="6" fill="#c084fc" opacity="0.7"/>
  <circle cx="430" cy="210" r="8" fill="#a78bfa"/><circle cx="80" cy="200" r="8" fill="#6366f1"/>
  <circle cx="140" cy="320" r="10" fill="#2dd4bf"/><circle cx="165" cy="305" r="6" fill="#34d399" opacity="0.7"/>
  <circle cx="380" cy="340" r="9" fill="#38bdf8"/>
  <!-- labels -->
  <text x="120" y="55" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Risk</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Growth</text>
  <text x="140" y="365" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Compliance</text>
  <text x="380" y="378" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">Ops</text>
  <rect x="168" y="168" width="184" height="28" rx="14" fill="rgba(6,9,15,0.85)" stroke="rgba(99,102,241,0.3)"/>
  <text x="260" y="186" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="system-ui,sans-serif" font-weight="500">Your mapping defines the graph</text>
</svg>
