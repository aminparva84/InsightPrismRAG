<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot password — PrismRAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/landing.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card" style="grid-column: 1 / -1; max-width: 480px; margin: 0 auto; border-right: none;">
      <a href="/" class="logo auth-logo"><span class="logo-prism">⬡</span><span class="logo-text">PrismRAG</span></a>
      <h1 class="auth-h1">Reset password</h1>
      <p class="auth-sub">We'll email you a link to choose a new password.</p>
      <div id="error-box" class="auth-error" style="display:none"></div>
      <div id="success-box" class="auth-success" style="display:none"></div>
      <form id="forgot-form" class="auth-form" novalidate>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" required autofocus placeholder="you@company.com"/>
        </div>
        <button type="submit" class="auth-submit" id="submit-btn">Send reset link</button>
      </form>
      <p class="auth-switch"><a href="/login.html">← Back to sign in</a></p>
    </div>
  </div>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-box');
      const ok = document.getElementById('success-box');
      err.style.display = 'none';
      ok.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      const email = new FormData(e.target).get('email');
      try {
        const res = await fetch('/api/v1/auth/password/forgot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Request failed');
        ok.textContent = data.message || 'Check your inbox for a reset link.';
        ok.style.display = 'block';
        e.target.reset();
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      }
      btn.textContent = 'Send reset link';
      btn.disabled = false;
    });
  </script>
</body>
</html>
