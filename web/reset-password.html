<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set new password — PrismRAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/landing.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card" style="grid-column: 1 / -1; max-width: 480px; margin: 0 auto; border-right: none;">
      <a href="/" class="logo auth-logo"><span class="logo-prism">⬡</span><span class="logo-text">PrismRAG</span></a>
      <h1 class="auth-h1">Choose a new password</h1>
      <p class="auth-sub">Must be at least 8 characters.</p>
      <div id="error-box" class="auth-error" style="display:none"></div>
      <form id="reset-form" class="auth-form" novalidate>
        <div class="field">
          <label>New password</label>
          <input type="password" name="password" required minlength="8" autofocus/>
        </div>
        <button type="submit" class="auth-submit" id="submit-btn">Update password</button>
      </form>
      <p class="auth-switch"><a href="/login.html">Sign in</a></p>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('error-box').textContent = 'Missing reset token. Request a new link.';
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-box');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Updating…';
      const password = new FormData(e.target).get('password');
      try {
        const res = await fetch('/api/v1/auth/password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Reset failed');
        window.location.href = '/login.html?reset=1';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.textContent = 'Update password';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
